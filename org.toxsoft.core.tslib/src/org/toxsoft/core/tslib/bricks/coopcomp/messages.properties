STR_CCS_CREATED       = Created
STR_CCS_CREATED_D     = Initial state of the component, immediately after constructor
STR_CCS_DESTROYED     = Destroyed
STR_CCS_DESTROYED_D   = destroy() was called and component becomes unusable
STR_CCS_INITIALIZED   = Initialized
STR_CCS_INITIALIZED_D = Component was initialized with init(ITsContextRo)
STR_CCS_STOPPING      = Stopping
STR_CCS_STOPPING_D    = queryStop() was called and component is finishing work
STR_CCS_WORKING       = Working
STR_CCS_WORKING_D     = Started by start() and working now
