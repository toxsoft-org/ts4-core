STR_CCS_CREATED       = Созданный
STR_CCS_CREATED_D     = Начальное состояние компонента сразу после конструктора.
STR_CCS_DESTROYED     = განადგურებული
STR_CCS_DESTROYED_D   = Была вызвана функция destroy(), и компонент стал непригодным для использования.
STR_CCS_INITIALIZED   = Инициализирован
STR_CCS_INITIALIZED_D = Компонент был инициализирован с помощью init(ITsContextRo)
STR_CCS_STOPPING      = Останавливается
STR_CCS_STOPPING_D    = Функция queryStop() была вызвана, и компонент завершает работу
STR_CCS_WORKING       = Работает
STR_CCS_WORKING_D     = Запущено функцией start() и теперь работает
